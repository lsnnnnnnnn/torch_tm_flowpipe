system: affine_controlled
description: "Plant-only folded affine controller: dx/dt = x + u, u = -0.5*x + e, so dx/dt = 0.5*x + e and de/dt = 0."
state_vars: [x, e]
metric_vars: [x]
initial:
  x: [0.0, 0.1]
  e: [-0.01, 0.01]
ode:
  x: "0.5*x + e"
  e: "0"
torch_ode: affine_controlled_folded
h: [0.01, 0.02, 0.05]
steps: [1, 5, 10, 20]
order: [3, 4, 5]
flowstar:
  remainder_estimation: 1.0e-10
  cutoff: 1.0e-15
  precision: 53
  plot_vars: [x]
